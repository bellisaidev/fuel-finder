server:
  port: 8080

spring:
  application:
    name: fuel-finder

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:fuelfinder}
    username: ${POSTGRES_USER:fuelfinder}
    password: ${POSTGRES_PASSWORD:change-me}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

fuelfinder:
  cache:
    nearby:
      ttl: 60s
      max-size: 500
    cheapest-nearby:
      ttl: 60s
      max-size: 500
  api:
    base-url: https://www.fuel-finder.service.gov.uk/api/v1
    oauth:
      token-path: /oauth/generate_access_token
      refresh-path: /oauth/regenerate_access_token
  ingestion:
    scheduler:
      enabled: false
      cron: "0 */30 * * * *"
      retailer-name: "FUEL_FINDER_API"
