server:
  port: 8080

spring:
  application:
    name: fuel-finder

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

fuelfinder:
  api:
    base-url: https://www.fuel-finder.service.gov.uk/api/v1
    oauth:
      token-path: /oauth/generate_access_token
      refresh-path: /oauth/regenerate_access_token